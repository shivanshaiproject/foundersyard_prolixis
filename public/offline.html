<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FoundersYard — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Figtree', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f0f0f;
      color: #e5e5e5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 420px; }
    .icon {
      width: 80px; height: 80px; margin: 0 auto 1.5rem;
      border-radius: 20px; overflow: hidden;
    }
    .icon img { width: 100%; height: 100%; object-fit: cover; }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.75rem; }
    p { font-size: 1rem; color: #a3a3a3; line-height: 1.6; margin-bottom: 2rem; }
    button {
      background: #f5f5f5; color: #0f0f0f; border: none;
      padding: 0.75rem 2rem; border-radius: 12px;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon"><img src="/icons/icon-192x192.png" alt="FoundersYard" /></div>
    <h1>You're offline</h1>
    <p>It looks like you've lost your internet connection. Don't worry — your data is safe. Reconnect and pick up right where you left off.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
